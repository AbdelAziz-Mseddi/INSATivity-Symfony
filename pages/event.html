<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event | INSATivity</title>
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/event.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="main-header">
      <div class="nav-container">
        <div class="logo">INSATivity</div>
        <nav class="main-nav">
          <a href="index.html" class="nav-link active">Events</a>
          <a href="calendar.html" class="nav-link">Calendar</a>
          <a href="clubs.html" class="nav-link">Clubs</a>
        </nav>
        <div class="header-actions">
          <img class="profile-avatar" src="../assets/icons/search.svg" alt="Search" />
          <img class="profile-avatar" src="../assets/icons/notifications.svg" alt="Notifications" />
          <img class="profile-avatar" src="../assets/icons/user.svg" alt="User" />
        </div>
      </div>
    </header>
    <div class="image_side" id="eventImage"></div>
    <div class="content_side">
      <section class="left">
        <h1 id="eventTitle">NAME OF THE EVENT</h1>
        <span id="eventClub">name of the club</span>
        
        <div class="event-info-grid">
          <div class="info-item">
            <strong><i class="fas fa-calendar-alt"></i> Date</strong>
            <span id="eventDate">date</span>
          </div>
          <div class="info-item">
            <strong><i class="fas fa-clock"></i> Time</strong>
            <span id="eventTime">time</span>
          </div>
          <div class="info-item">
            <strong><i class="fas fa-map-marker-alt"></i> Location</strong>
            <span id="eventLocation">place</span>
          </div>
        </div>

        <div class="description-box">
          <p id="eventDescription">texte</p>
        </div>
      </section>

      <aside class="right">
        <div class="action-card">
          <div class="participants-line">
            <div class="progress" id="eventProgress" style="width: 60%">30 / 50 participants</div>
          </div>
          <button class="btn-action btn-primary"><i class="fas fa-user-plus"></i> Register Now</button>
          <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-action btn-outline"><i class="fas fa-calendar-plus"></i> Add to Calendar</button>
            <button class="btn-action btn-outline"><i class="fas fa-share-alt"></i> Share Event</button>
          </div>
        </div>
      </aside>
    </div>
    <script>
      // Load event details from sessionStorage
      document.addEventListener("DOMContentLoaded", () => {
        const eventData = sessionStorage.getItem("currentEvent");
        if (eventData) {
          const event = JSON.parse(eventData);
          
          // Update event details
          document.getElementById("eventTitle").textContent = event.title;
          document.getElementById("eventClub").textContent = event.club;
          document.getElementById("eventDate").textContent = new Date(event.date).toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
          document.getElementById("eventTime").textContent = event.time;
          document.getElementById("eventLocation").textContent = event.location;
          document.getElementById("eventDescription").textContent = event.description;
          
          // Update participants progress
          const progressPercent = (event.participants / event.maxParticipants) * 100;
          const progressEl = document.getElementById("eventProgress");
          progressEl.style.width = progressPercent + "%";
          progressEl.textContent = `${event.participants} / ${event.maxParticipants} participants`;
          
          // Set background image
          const imageDiv = document.getElementById("eventImage");
          imageDiv.style.backgroundImage = `url('${event.image}')`;
          imageDiv.style.backgroundSize = "cover";
          imageDiv.style.backgroundPosition = "center";
        }
      });
    </script>
  </body>
</html>
