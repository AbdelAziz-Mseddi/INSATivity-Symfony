security:
    #on dit a symfony comment lire les anciens mdp
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        #où chercher les utilisateurs dans la BD
        app_user_provider:
          entity: { class: App\Entity\User, property: username }
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            #relie pare-feu avec bdd
            provider: app_user_provider

            # JSON API login (fetch with {username, password}).
            json_login:
              check_path: /api/auth/login
              username_path: username
              password_path: password
              success_handler: App\Security\JsonLoginSuccessHandler
              failure_handler: App\Security\JsonLoginFailureHandler

            # Browser form login (the login.html page posts _username/_password).
            form_login:
              login_path: app_login
              check_path: app_login
              username_parameter: _username
              password_parameter: _password
              default_target_path: home
              enable_csrf: false

            logout:
              path: logout
              target: app_login




    access_control:
      # Les routes publiques (Login, Register, et la lecture des events)
      - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
      - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
      - { path: ^/api/events, roles: PUBLIC_ACCESS, methods: [ GET ] }
      - { path: ^/api/clubs, roles: PUBLIC_ACCESS, methods: [ GET ] }

      # Le grand verrou pour toutes les autres requêtes (POST, PUT, DELETE)
      - { path: ^/api, roles: ROLE_USER }

when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4 # Lowest possible value for bcrypt
        time_cost: 3 # Lowest possible value for argon
        memory_cost: 10 # Lowest possible value for argon
