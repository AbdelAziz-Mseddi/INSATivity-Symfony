doctrine:
    dbal:
        url: '%env(DATABASE_URL)%'
        # SSL mode is taken from the DATABASE_URL query string:
        #   ?sslmode=require  for Supabase, ?sslmode=disable for local Postgres.
        server_version: '15'
        # Postgres timestamptz columns carry microseconds (e.g. ...:15.235051+00),
        # which the default datetimetz types can't parse. The Var* variants parse
        # any valid datetime string, so they handle fractional seconds + offset.
        types:
            datetimetz_immutable: Doctrine\DBAL\Types\VarDateTimeImmutableType
            datetimetz: Doctrine\DBAL\Types\VarDateTimeType
        schema_filter: ~^(users|clubs|events|doctrine_migration_versions)$~
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
